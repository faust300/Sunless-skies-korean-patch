name: Release Installer

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  package:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Publish standalone installer
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          dotnet publish tools/SunlessSkiesKoreanInstaller/SunlessSkiesKoreanInstaller.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:PublishTrimmed=true `
            -p:TrimMode=full `
            -o _release/publish
          Get-ChildItem _release/publish | Format-Table Name, Length

      - name: Build release zip
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $name = "SunlessSkies-KoreanPatch"
          $zip = "$name.zip"
          if (Test-Path $zip) { Remove-Item $zip -Force }
          $stage = "_release/$name"
          if (Test-Path $stage) { Remove-Item $stage -Recurse -Force }
          New-Item -ItemType Directory -Path $stage | Out-Null
          New-Item -ItemType Directory -Path "$stage/translations" | Out-Null
          New-Item -ItemType Directory -Path "$stage/translation-source" | Out-Null
          New-Item -ItemType Directory -Path "$stage/delta" | Out-Null
          Copy-Item README.md $stage
          Copy-Item _release/publish/SunlessSkiesKoreanInstaller.exe $stage
          Copy-Item payload/font $stage
          Copy-Item translations/*.txt "$stage/translations"
          Copy-Item translations/*.txt "$stage/translation-source"
          Copy-Item payload/metadata_ui*.txt "$stage/translation-source"
          Copy-Item payload/delta/* "$stage/delta"

          $xdeltaVersion = "3.2.0"
          $xdeltaArchive = "_release/xdelta3-$xdeltaVersion.zip"
          $xdeltaUrl = "https://github.com/jmacd/xdelta/releases/download/v$xdeltaVersion/xdelta3-$xdeltaVersion-windows-x86_64.zip"
          $xdeltaSha256 = "af8ef036cb077a48df080c9a8ac1be4a6e7511c32d11f8bec89b6803a9e52576"
          Invoke-WebRequest -Uri $xdeltaUrl -OutFile $xdeltaArchive
          $actualXdeltaHash = (Get-FileHash -Algorithm SHA256 $xdeltaArchive).Hash.ToLowerInvariant()
          if ($actualXdeltaHash -ne $xdeltaSha256) {
            throw "xdelta3 archive SHA-256 mismatch: $actualXdeltaHash"
          }
          $xdeltaExtract = "_release/xdelta3-$xdeltaVersion"
          Expand-Archive -Path $xdeltaArchive -DestinationPath $xdeltaExtract -Force
          $xdeltaExe = Get-ChildItem $xdeltaExtract -Filter xdelta3.exe -Recurse | Select-Object -First 1
          $xdeltaReadme = Get-ChildItem $xdeltaExtract -Filter README.md -Recurse | Select-Object -First 1
          if (-not $xdeltaExe -or -not $xdeltaReadme) {
            throw "xdelta3 release contents are incomplete."
          }
          Copy-Item $xdeltaExe.FullName "$stage/xdelta3.exe"
          Copy-Item $xdeltaReadme.FullName "$stage/XDELTA3-NOTICE.md"
          Compress-Archive -Path "$stage/*" -DestinationPath $zip -Force
          Get-Item $zip | Format-List Name, Length

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SunlessSkies-KoreanPatch
          path: SunlessSkies-KoreanPatch.zip

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: SunlessSkies-KoreanPatch.zip
          generate_release_notes: true
