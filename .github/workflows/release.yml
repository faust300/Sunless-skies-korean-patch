name: Release Installer

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  package:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Publish standalone installer
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          dotnet publish tools/SunlessSkiesKoreanInstaller/SunlessSkiesKoreanInstaller.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -o _release/publish
          Get-ChildItem _release/publish | Format-Table Name, Length

      - name: Build release zip
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $name = "SunlessSkies-KoreanPatch"
          $zip = "$name.zip"
          if (Test-Path $zip) { Remove-Item $zip -Force }
          $stage = "_release/$name"
          if (Test-Path $stage) { Remove-Item $stage -Recurse -Force }
          New-Item -ItemType Directory -Path $stage | Out-Null
          New-Item -ItemType Directory -Path "$stage/translations" | Out-Null
          New-Item -ItemType Directory -Path "$stage/translation-source" | Out-Null
          New-Item -ItemType Directory -Path "$stage/Sunless Skies_Data" | Out-Null
          Copy-Item README.md $stage
          Copy-Item INSTALL_KOREAN_PATCH.bat $stage
          Copy-Item _release/publish/SunlessSkiesKoreanInstaller.exe $stage
          Copy-Item payload/font $stage
          Copy-Item payload/BepInEx/Translation/ko/Text/*.txt "$stage/translations"
          Copy-Item payload/BepInEx/Translation/ko/Text/*.txt "$stage/translation-source"
          Copy-Item payload/metadata_ui*.txt "$stage/translation-source"
          Copy-Item "payload/Sunless Skies_Data/*" "$stage/Sunless Skies_Data" -Recurse
          Compress-Archive -Path "$stage/*" -DestinationPath $zip -Force
          Get-Item $zip | Format-List Name, Length

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SunlessSkies-KoreanPatch
          path: SunlessSkies-KoreanPatch.zip

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: SunlessSkies-KoreanPatch.zip
          generate_release_notes: true
